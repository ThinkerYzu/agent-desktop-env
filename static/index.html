<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Desktop Environment</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">
    <div id="file-tree" class="panel">
      <div class="panel-header">Files</div>
      <div class="panel-content" id="file-tree-content">
      </div>
    </div>
    <div id="document-panel" class="panel">
      <div class="panel-header">
        <div id="doc-tabs"></div>
      </div>
      <div class="panel-content" id="document-content">
        <div class="placeholder">Select a file to view</div>
      </div>
    </div>
    <div id="chat-panel" class="panel">
      <div class="panel-header">
        <span>Chat</span>
        <button id="session-switch" title="Switch session">Sessions</button>
      </div>
      <div class="panel-content" id="chat-messages">
      </div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Type a message..." rows="3"></textarea>
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
  <div id="session-picker" style="display: none;">
    <div id="session-picker-dialog">
      <div class="session-picker-header">
        <span>Resume a session</span>
        <span id="session-picker-close" class="session-picker-close">&times;</span>
      </div>
      <div id="session-list"></div>
      <button id="session-new">New Session</button>
    </div>
  </div>
  <script src="/static/js/marked.min.js"></script>
  <script src="/static/js/mermaid.min.js"></script>
  <script src="/static/js/document.js"></script>
  <script src="/static/js/filetree.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
